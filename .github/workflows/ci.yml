name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.9.26"
  SCFW_VERSION: "2.6.0"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup uv
        # astral-sh/setup-uv@v8.2.0
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          version: ${{ env.UV_VERSION }}

      - name: Compute exclude-newer date
        shell: bash
        run: |
          set -euo pipefail
          echo "EXCLUDE_NEWER=$(date -u -d '-3 days' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: SCFW supply-chain audit
        shell: bash
        run: |
          set -euo pipefail
          uv export --frozen --exclude-newer "$EXCLUDE_NEWER" --extra test --extra dev --no-hashes -o scfw_requirements.txt
          uv venv .scfw-venv
          source .scfw-venv/bin/activate
          python -m ensurepip --upgrade
          uvx "scfw==$SCFW_VERSION" run --allow-on-warning pip install -r scfw_requirements.txt
          deactivate
          rm -rf .scfw-venv scfw_requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv sync --frozen --exclude-newer "$EXCLUDE_NEWER" --extra test --extra dev

      - name: Ruff lint
        run: uv run --frozen --exclude-newer "$EXCLUDE_NEWER" ruff check app/

      - name: Ruff format check
        run: uv run --frozen --exclude-newer "$EXCLUDE_NEWER" ruff format --check app/

      - name: Pyright
        run: uv run --frozen --exclude-newer "$EXCLUDE_NEWER" pyright app/

      - name: Unit tests
        run: uv run --frozen --exclude-newer "$EXCLUDE_NEWER" pytest app/tests/unit/ -v --tb=short

      - name: Integration tests
        run: uv run --frozen --exclude-newer "$EXCLUDE_NEWER" pytest app/tests/integration/ -v --tb=short -x
