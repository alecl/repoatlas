name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? Include the command, any flags or config, and a minimal Java snippet or link to public repo specific commit if this is a parsing issue.
      placeholder: |
        1. Run `repoatlas analyze /path/to/project --format markdown`
        2. Open the output file
        3. Notice that endpoint X is missing or incorrect
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what happened instead?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, or any other relevant environment details.
      placeholder: Python 3.12, macOS 14.5
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other information that might help us investigate.
    validations:
      required: false
